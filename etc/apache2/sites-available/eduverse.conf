# Main platform
<VirtualHost *:80>
    ServerName eduverse.ng
    ServerAlias www.eduverse.ng
    DocumentRoot /var/www/eduverse.ng/public
    
    <Directory /var/www/eduverse.ng/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/eduverse_error.log
    CustomLog ${APACHE_LOG_DIR}/eduverse_access.log combined
</VirtualHost>
 
# Wildcard subdomain routing
<VirtualHost *:80>
    ServerAlias *.eduverse.ng
    VirtualDocumentRoot /var/www/school-sites/%1
    
    <Directory /var/www/school-sites>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/schools_error.log
    CustomLog ${APACHE_LOG_DIR}/schools_access.log combined
</VirtualHost>